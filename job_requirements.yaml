# ── DISQUALIFIERS ─────────────────────────────────────────────
disqualifiers:

  pure_consulting_firms:
    # Hard disqualifier ONLY if entire career is here; one role is fine
    companies:
      - tcs
      - tata consultancy
      - infosys
      - wipro
      - accenture
      - cognizant
      - capgemini
      - tech mahindra
      - techmahindra
      - hexaware
      - mphasis
    penalty_entire_career: 0.0    # hard zero if ALL roles are at these firms
    penalty_current_only: 0.75    # penalty if only current role, prior product exp OK

  pure_research_only:
    # detect via career_history descriptions having only academic/paper language
    research_phrases:
      - "published paper"
      - "research paper"
      - "academic research"
      - "arxiv"
      - "research lab"
      - "phd research"
      - "thesis"
      - "research intern"
    production_phrases:
      - deployed
      - production
      - shipped
      - launched
      - served
      - real users
      - at scale
    # If ALL career descriptions have research_phrases and NONE have production_phrases → flag
    penalty: 0.05   # near-zero

  langchain_only:
    # <12 mo total experience that is entirely framework-calling-api language
    keywords:
      - langchain
      - llamaindex
      - llama-index
      - llama index
      - openai api
      - chatgpt api
    # Used alongside very short YOE with no pre-LLM ML background
    max_yoe_for_flag: 2.0
    penalty: 0.15

  no_code_senior:
    # Senior+ title, role descriptions read as "architecture" not "coding"
    senior_title_words:
      - senior
      - staff
      - principal
      - director
      - vp
      - head of
      - chief
    architecture_only_phrases:
      - "defined architecture"
      - "led the team"
      - "managed engineers"
      - "roadmap"
      - "stakeholder"
    # Combined with no hands-on terms in last 2 roles → flag
    penalty: 0.50

  title_chaser:
    # Escalating senior titles, median tenure < threshold
    seniority_words_ordered:
      - junior
      - associate
      - mid
      - senior
      - staff
      - principal
      - director
    short_tenure_months: 16   # median tenure below this triggers flag
    penalty: 0.60

  cv_speech_robotics_only:
    domain_phrases:
      - computer vision
      - object detection
      - image segmentation
      - speech recognition
      - asr
      - tts
      - text to speech
      - robotics
      - ros
      - slam
    nlp_ir_phrases:
      - nlp
      - natural language
      - text
      - ranking
      - retrieval
      - search
      - recommendation
      - information retrieval
    penalty: 0.40  # if ONLY cv/speech/robotics, no NLP/IR anywhere

  closed_source_only_5yr:
    # 5+ years with no OSS, papers, talks
    penalty: 0.60

# ── EXPERIENCE BAND ───────────────────────────────────────────
experience_band:
  min: 5
  max: 9
  hard_cutoff: false     # JD explicitly says "outside band OK with strong signals"
  # Score peak at 6-8, graceful decay outside band

# ── NOTICE PERIOD ─────────────────────────────────────────────
notice_period:
  ideal_max_days: 30
  soft_penalty_beyond: true     # graded, NOT a cliff
  # 0-30d: multiplier=1.0
  # 31-60d: multiplier=0.90
  # 61-90d: multiplier=0.78
  # 91+d:   multiplier=0.65

# ── LOCATION ──────────────────────────────────────────────────
location:
  score_10:   [pune, noida]
  score_085:  [hyderabad, mumbai, delhi, delhi ncr, gurugram, gurgaon, bengaluru, bangalore, new delhi]
  score_065:  []   # other india cities (catch-all)
  score_045:  []   # outside india
  relocation_boost: 0.10   # added if willing_to_relocate=true

# ── FINAL SCORE WEIGHTS ───────────────────────────────────────
score_weights:
  skill_evidence:    0.35
  domain_fit:        0.30
  trajectory:        0.15
  embedding_sim:     0.10   # set to 0.0 if embeddings not computed
  location_fit:      0.10

# ── BEHAVIORAL MULTIPLIER RANGE ───────────────────────────────
behavioral_multiplier:
  min: 0.30    # never zero out a strong fit entirely
  max: 1.00
